<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futuristic Image Galleries</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0e0e0e;
    color: #fff;
  }
  h1 {
    text-align: center;
    font-size: 2.5em;
    margin: 20px 0;
    color: #00fff7;
    text-shadow: 0 0 10px #00fff7, 0 0 20px #00fff7;
  }
  .gallery {
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }
  .gallery h2 {
    color: #ff00ff;
    text-shadow: 0 0 5px #ff00ff;
    margin-bottom: 10px;
  }
  .images {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
  }
  .images img {
    width: 100%;
    border-radius: 10px;
    border: 2px solid #00fff7;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
  }
  .images img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #00fff7, 0 0 30px #ff00ff;
  }
  .view-all {
    display: block;
    width: 200px;
    margin: 15px auto;
    text-align: center;
    padding: 10px;
    background: #00fff7;
    color: #0e0e0e;
    border-radius: 25px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 0 10px #00fff7;
    transition: 0.3s;
  }
  .view-all:hover {
    background: #ff00ff;
    color: #fff;
    box-shadow: 0 0 15px #ff00ff;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border: 3px solid #00fff7;
    border-radius: 10px;
  }
  .lightbox:target {
    display: flex;
  }
</style>
</head>
